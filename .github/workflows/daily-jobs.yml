name: Daily job discovery

on:
  schedule:
    - cron: '30 2 * * *' # 08:00 IST
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: daily-job-discovery
  cancel-in-progress: false

jobs:
  discover-and-match:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Run discovery pipeline
        run: npm run jobs:daily
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY || secrets.SUPABASE_SERVICE_ROLE_KEY }}
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
          HF_EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
          HF_TEXT_MODEL: ${{ vars.HF_TEXT_MODEL || 'Qwen/Qwen2.5-7B-Instruct' }}
          HF_TEXT_PROVIDER: ${{ vars.HF_TEXT_PROVIDER || 'together' }}
          HF_EMBEDDING_PROVIDER: ${{ vars.HF_EMBEDDING_PROVIDER || 'hf-inference' }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          ADZUNA_COUNTRY: ${{ vars.ADZUNA_COUNTRY || 'in' }}
          JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
          RAPIDAPI_JSEARCH_KEY: ${{ secrets.RAPIDAPI_JSEARCH_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
