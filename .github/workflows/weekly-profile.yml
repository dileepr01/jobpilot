name: Weekly profile suggestions

on:
  schedule:
    - cron: '0 3 * * 1' # Monday 08:30 IST
  workflow_dispatch:

permissions:
  contents: read

jobs:
  suggestions:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - run: npm run suggestions:weekly
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY || secrets.SUPABASE_SERVICE_ROLE_KEY }}
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
          HF_EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
          HF_TEXT_MODEL: ${{ vars.HF_TEXT_MODEL || 'mistralai/Mistral-7B-Instruct-v0.3' }}
          HF_PROVIDER: ${{ vars.HF_PROVIDER || 'hf-inference' }}
